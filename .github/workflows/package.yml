name: Package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-os: windows
          - os: macos-latest
            artifact-os: macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,package]"

      - name: Run tests
        run: python -m pytest

      - name: Build packaged executable
        run: python scripts/build_package.py --clean --mode onedir --name KGFS --dist-dir dist-packages

      - name: Smoke test packaged executable
        run: python scripts/smoke_test_packaged.py --package dist-packages/KGFS

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: KGFS-${{ matrix.artifact-os }}-${{ runner.arch == 'ARM64' && 'arm64' || 'x64' }}
          path: dist-packages/KGFS-${{ matrix.artifact-os }}-*.zip
          if-no-files-found: error
          retention-days: 14
