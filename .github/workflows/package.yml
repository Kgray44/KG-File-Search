name: Package

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional existing v* tag to create a draft release for."
        required: false
        type: string

permissions:
  contents: read

jobs:
  package:
    name: Package (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_os: windows
            arch: x64
          - os: macos-latest
            artifact_os: macos
            arch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,package]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run lint
        run: python -m ruff check .

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Run scoped typecheck
        run: python -m mypy

      - name: Check docs consistency
        run: python scripts/check_docs_consistency.py

      - name: Build packaged executable
        run: python scripts/build_package.py --clean --mode onedir

      - name: Smoke test packaged executable
        run: python scripts/smoke_test_packaged.py --package dist-packages/KGFS

      - name: Generate package checksums
        run: python scripts/generate_checksums.py dist-packages

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: KGFS-${{ matrix.artifact_os }}-${{ matrix.arch }}
          path: |
            dist-packages/*.zip
            dist-packages/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.release_tag, 'v'))
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate aggregate SHA256SUMS
        run: python scripts/generate_checksums.py release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          files: |
            release-assets/KGFS-*.zip
            release-assets/SHA256SUMS.txt
