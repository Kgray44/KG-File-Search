# KG File Search example config.
# Copy this to config.yaml or run: kgfs init

# Explicitly list folders you want indexed. KGFS will not index anything until
# you add folders here.
indexed_folders: []
# Examples:
#  - "~/Documents"
#  - "~/Downloads"
#  - "~/Desktop"

# Folder names skipped anywhere below indexed folders.
ignored_folders:
  - ".git"
  - ".svn"
  - ".hg"
  - "node_modules"
  - ".venv"
  - "venv"
  - "env"
  - "__pycache__"
  - ".pytest_cache"
  - ".mypy_cache"
  - "build"
  - "dist"
  - "target"
  - ".idea"
  - ".vscode"
  - "vendor"
  - "Library"
  - "AppData"
  - "Windows"
  - "Program Files"
  - "Program Files (x86)"
  - "$Recycle.Bin"
  - "System Volume Information"
  - "Applications"
  - "System"
  - "Steam"
  - "SteamLibrary"
  - "Epic Games"
  - "XboxGames"

# KGFS only indexes these text-like file types in the MVP.
include_extensions:
  - ".txt"
  - ".md"
  - ".py"
  - ".js"
  - ".ts"
  - ".html"
  - ".css"
  - ".json"
  - ".csv"
  - ".docx"
  - ".pdf"

# These file types are skipped even if they appear in an indexed folder.
ignored_extensions:
  - ".exe"
  - ".dll"
  - ".dylib"
  - ".so"
  - ".app"
  - ".bin"
  - ".png"
  - ".jpg"
  - ".jpeg"
  - ".gif"
  - ".bmp"
  - ".tiff"
  - ".mp4"
  - ".mov"
  - ".avi"
  - ".mkv"
  - ".mp3"
  - ".wav"
  - ".flac"
  - ".zip"
  - ".7z"
  - ".rar"
  - ".tar"
  - ".gz"

exclude_globs:
  - "~$*"
  - "*.tmp"

max_file_size_mb: 25
follow_symlinks: false

# Optional. Leave null to store the SQLite database in your platform app-data
# folder. Set a path for project-local development or portable experiments.
database_path: null

indexing:
  store_extracted_text: true
  skip_unchanged_files: true
  hash_files: true

extraction:
  pdf_max_pages: 250

ocr:
  # Local Tesseract OCR is disabled by default. When enabled, OCR text is
  # stored in the KGFS index/cache only; source images and PDFs are not changed.
  enabled: false
  backend: "tesseract"
  include_extensions:
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".tiff"
    - ".bmp"
  max_image_size_mb: 15
  cache_results: true
  modify_source_files: false
  min_pdf_text_chars: 20
  pdf_max_pages: null
  image_preprocessing: true
  tesseract:
    command: "tesseract"
    language: "eng"

semantic:
  enabled: false
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  chunk_size_chars: 1200
  chunk_overlap_chars: 200
  local_files_only: true
  batch_size: 16

search:
  default_mode: "auto"
  default_limit: 10
  highlight_matches: true
  save_latest_results: true

deep_search:
  enabled: true
  max_passes: 3
  max_candidates: 50
  rerank_top_n: 20
  query_expansion: true
  suggest_followups: true

research:
  max_files: 12
  max_chunks: 20
  suggest_related_terms: true

similar:
  default_limit: 10
  min_score: 0.0

timeline:
  default_limit: 50

profiles:
  # Optional named search presets. User-created workflow profiles are stored
  # in the KGFS database; config profiles are lightweight presets.
  # school:
  #   folders: []
  #   extensions:
  #     - ".pdf"
  #     - ".docx"
  #     - ".md"
  #   default_mode: "hybrid"
  #   boost_terms: []
  # audio:
  #   folders: []
  #   extensions: []
  #   default_mode: "hybrid"
  #   boost_terms:
  #     - "filter"
  #     - "crossover"
  #     - "op amp"
  #     - "frequency response"

assignment:
  default_limit: 20
  include_extensions:
    - ".pdf"
    - ".docx"
    - ".md"
    - ".txt"
    - ".csv"
    - ".py"

projects:
  default_limit: 20
  infer_from_folders: false

intelligence:
  duplicate_min_semantic_score: 0.92
  version_min_similarity: 0.72
  project_min_score: 0.55
  graph_max_nodes: 40
  graph_max_edges: 120
  health_check_limit: 100

metadata:
  backup_dir: null
  auto_backup_before_reset: true
  export_format: "json"

ui:
  default_surface: "cli"
  tui_enabled: true
  web_enabled: true
  open_browser_on_web_start: false

api:
  enabled: false
  host: "127.0.0.1"
  port: 8766
  require_token: true
  token_env: "KGFS_API_TOKEN"
  allow_file_actions: false

integrations:
  enabled: true
  raycast_enabled: false
  alfred_enabled: false
  powertoys_enabled: false
  finder_enabled: false
  explorer_enabled: false
  tray_enabled: false

vectors:
  backend: "sqlite_scan"
  shard_strategy: "none"
  sqlite_vec:
    enabled: false
    experimental: true
  hnsw:
    enabled: false
    space: "cosine"
    m: 16
    ef_construction: 200
    ef_search: 50
  faiss:
    enabled: false
    index_type: "flat"
    use_gpu: false

hybrid:
  keyword_weight: 0.35
  semantic_weight: 0.45
  filename_weight: 0.15
  path_weight: 0.05
  exact_phrase_weight: 0.10
  recency_weight: 0.05
  candidate_limit_multiplier: 5

ai:
  enabled: false
  provider: "openai"
  model: "gpt-5.4-nano"
  api_key_env: "OPENAI_API_KEY"
  require_confirmation: true
  preview_context_before_send: true
  send_file_paths: false
  redact_home_path: true
  send_full_file_text: false
  max_results_sent: 12
  max_chars_per_result: 1500
  max_total_chars_sent: 12000
  allow_query_expansion: true
  allow_rerank: true
  allow_answer_synthesis: true
