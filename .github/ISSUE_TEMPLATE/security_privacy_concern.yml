name: Security/privacy concern
description: Report a safety, privacy, local-first, or data-handling concern.
title: "[Security/Privacy]: "
labels: ["security", "privacy"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the concern without sharing secrets or private file contents.
    validations:
      required: true
  - type: textarea
    id: data_boundary
    attributes:
      label: Data boundary
      description: What data/path/cache/network boundary is involved?
  - type: input
    id: os
    attributes:
      label: OS
  - type: input
    id: python_version
    attributes:
      label: Python version
  - type: input
    id: kgfs_version
    attributes:
      label: KGFS version
  - type: dropdown
    id: install_type
    attributes:
      label: Install type
      options:
        - Editable/source install
        - Packaged executable
        - pip install
        - Other
  - type: textarea
    id: command
    attributes:
      label: Command run
      description: Include only redacted commands/output.
  - type: textarea
    id: doctor_output
    attributes:
      label: kgfs doctor output, redacted
  - type: textarea
    id: capabilities_output
    attributes:
      label: kgfs capabilities output, redacted
  - type: textarea
    id: optional_dependencies
    attributes:
      label: Optional dependencies installed
      description: Include AI/OCR/media/API extras if relevant.
