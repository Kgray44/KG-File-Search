name: Feature request
description: Suggest a local-first KGFS improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What workflow should KGFS improve?
    validations:
      required: true
  - type: textarea
    id: local_first_boundary
    attributes:
      label: Local-first boundary
      description: How should this avoid cloud behavior, source-file modification, and sidecars?
  - type: input
    id: os
    attributes:
      label: OS
  - type: input
    id: python_version
    attributes:
      label: Python version
  - type: input
    id: kgfs_version
    attributes:
      label: KGFS version
  - type: dropdown
    id: install_type
    attributes:
      label: Install type
      options:
        - Editable/source install
        - Packaged executable
        - pip install
        - Other
  - type: textarea
    id: command
    attributes:
      label: Command run
      description: If relevant, paste the command that led to the request.
  - type: textarea
    id: doctor_output
    attributes:
      label: kgfs doctor output, redacted
  - type: textarea
    id: capabilities_output
    attributes:
      label: kgfs capabilities output, redacted
  - type: textarea
    id: optional_dependencies
    attributes:
      label: Optional dependencies installed
