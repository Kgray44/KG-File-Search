name: Package

"on":
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-os: windows
          - os: macos-latest
            artifact-os: macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,package]"

      - name: Run tests
        run: python -m pytest

      - name: Run lint
        run: python -m ruff check .

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Run scoped typecheck
        run: python -m mypy

      - name: Check docs consistency
        run: python scripts/check_docs_consistency.py

      - name: Build packaged executable
        run: python scripts/build_package.py --clean --mode onedir --name KGFS --dist-dir dist-packages

      - name: Generate package checksums
        run: python scripts/generate_checksums.py dist-packages

      - name: Smoke test packaged executable
        run: python scripts/smoke_test_packaged.py --package dist-packages/KGFS

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: KGFS-${{ matrix.artifact-os }}-${{ runner.arch == 'ARM64' && 'arm64' || 'x64' }}
          path: |
            dist-packages/KGFS-${{ matrix.artifact-os }}-*.zip
            dist-packages/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate aggregate SHA256SUMS
        run: python scripts/generate_checksums.py release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            release-assets/KGFS-*.zip
            release-assets/SHA256SUMS.txt
